body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣施護等奉詔譯如是我聞一時佛在王舍城迦蘭陀竹林精舍與苾芻衆俱時有尊者名曰隨勇在王舍城側尸陀林間蛇聚孤峯之上大僧坊中而獨經行忽為毒蛇之所噬蠚蛇之身形瘦細精光猛惡可畏如安惹那舍羅迦即時隨勇尊者呼苾芻衆謂言諸尊者我為毒蛇之所噬蠚膚體潰壞今宜置我於僧坊外無令延毒而復流散是時尊者舍利子去隨勇尊者所止不遠在一樹下坐聞彼隨勇發如是言聞已即時往詣其所到已謂言尊者隨勇我向觀汝面及諸根本無異相何故今時乃發是聲隨勇答言尊者我為毒蛇之所噬蠚膚體潰壞今宜置我於僧坊外無令延毒而復流散尊者舍利子若我取著眼是我眼是我所耳鼻舌身意是我意是我所色是我色是我所聲香味觸法是我法是我所地界是我地界是我所水火風空識界是我識界是我所色蘊是我色蘊是我所受想行識蘊是我識蘊是我所我若取著如是等法面及諸根可有異相尊者舍利子我不如是取著諸法謂眼是我眼是我所乃至識蘊是我識蘊是我所今此何故面及諸根有是異相舍利子言尊者隨勇若我我所見及我慢等斷取著已復能了知所斷根本永斷無餘如破多羅樹心不復更生證無生法者彼復何有異相可得時尊者舍利子以尊者隨勇置僧坊外僵仆于地爾時尊者舍利子即說伽陀曰智者善行於梵行復常善修正道因臨捨壽時喜心生如重病人得輕差智者善行於梵行復常善修正道因臨捨壽時喜心生猶如棄置惡毒器智者善行於梵行復常善修正道因能頴脫於捨報時如人出離於火宅智行梵行修正道悉觀世間如草木都無義利無所成畢竟一切無繫著爾時尊者舍利子為隨勇尊者安置事已往詣佛所到已頭面禮世尊足具陳上事佛言舍利子彼隨勇善男子若於爾時得聞我說勝妙伽陀及大明章句彼定不為毒蛇所蠚潰壞其身舍利子白佛言世尊何等勝妙伽陀何等大明章句願為我說爾時世尊即說伽陀曰持國天王我行慈愛囉嚩尾龍亦然阿說多哩劍末羅悉體埵子悉慈愛廣目天王我行慈黑瞿曇龍慈亦然難陀烏波難陀龍彼二行慈亦如是我於無足行慈愛二足四足亦復然及彼多足諸有情等行慈心悉無異一切龍等行慈愛彼龍棲止大海中於諸有情普慈心若情若器皆如是所有一切有情類乃至蜎飛及蠕動普願銷除病惱因一切獲得安隱樂所有一切有情類乃至蜎飛及蠕動普以賢善平等觀一切蠲除諸罪惡蛇之為毒極猛熾其毒能壞人身命而彼蛇窟山峯中我常處之而遊上我為無上世間師我常宣說真實語以我真實語業因我身蛇毒不能入所有貪瞋及癡法此三世間為大毒世尊大覺毒不侵佛真實力能破毒所有貪瞋及癡法此三世間為大毒世尊正法毒不侵法真實力能破毒所有貪瞋及癡法此三世間為大毒世尊淨衆毒不侵僧真實力能破毒世間所有諸毒中而彼貪毒最為上唯佛能破能攝持由斯諸毒皆息滅爾時世尊說大明曰怛𭔞切身他一句唵引凍蜜里引二凍蜜里引三凍彌引四鉢囉二合凍彌引五那致引六蘇那致引七計引嚩致引八母那曳引九薩三摩曳引十難帝引十一難底里引十二泥引里引十三泥引羅計引尸引十四嚩引里引十五嚩引羅計引尸引十六嗢里引十七泥羊二合虞引里引莎引賀引十八佛言舍利子彼隨勇善男子若於爾時得聞我說如是伽陀及大明章句彼定不為蛇毒所蠚潰壞其身舍利子白佛言世尊如佛今說勝妙伽陀及此大明章句彼隨勇苾芻蛇所蠚時離於佛所如是妙法其云何得爾時尊者舍利子說是語已頭面著地禮世尊足出於佛會
